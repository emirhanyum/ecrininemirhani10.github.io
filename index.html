<!DOCTYPE html>
<html>
<head>
    <title>Benim Sitem</title>
    <script>
        function girisKontrol() {
            var sifre = prompt("Siteye giriş için şifreyi gir:");

            if (sifre !== "emirhankalpecrin") {
                alert("Yanlış şifre! Siteye giriş yok.");
                window.location.href = "https://google.com";
            }
        }

        window.onload = girisKontrol;
    </script>
</head>
<body>
    <h1>Siteye Hoşgeldin 🎉</h1>
    <p>Şifre doğruysa burayı görebilirsin.</p>
</body>
</html>
<h2>Videom 🎬</h2>

<video width="600" controls>
  <source src="video.mp4" type="video/mp4">
</video>
